name: Clean UI Build v3 arm64 diagnostic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Inspect project structure
        run: |
          echo "Root files:"
          ls -la
          echo ""
          echo "App Gradle file:"
          sed -n '1,220p' app/build.gradle.kts || true
          echo ""
          echo "Android resources likely related to UI:"
          find app/src/main/res -maxdepth 2 -type f \( -name "*.xml" -o -name "*.kt" \) | sort | sed -n '1,220p'

      - name: Apply arm64-only build patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("app/build.gradle.kts")
          if not path.exists():
              raise SystemExit("app/build.gradle.kts not found")

          old = path.read_text(encoding="utf-8", errors="ignore")
          new = old

          if "splits {" not in new:
              marker = re.search(r'android\s*\{', new)
              if not marker:
                  raise SystemExit("android block not found in app/build.gradle.kts")

              insert = '''
    splits {
        abi {
            isEnable = true
            reset()
            include("arm64-v8a")
            isUniversalApk = false
        }
    }

'''
              pos = marker.end()
              new = new[:pos] + insert + new[pos:]
              print("Inserted ABI split block for arm64-v8a")
          else:
              print("Existing splits block found. Will not blindly edit it.")

          if "abiFilters" not in new:
              match = re.search(r'defaultConfig\s*\{', new)
              if match:
                  insert = ' ndk { abiFilters.add("arm64-v8a") }'
                  pos = match.end()
                  new = new[:pos] + insert + new[pos:]
                  print("Inserted defaultConfig ndk abiFilters arm64-v8a")
              else:
                  print("defaultConfig block not found; skipped abiFilters")
          else:
              print("Existing abiFilters found. Will not duplicate it.")

          if new != old:
              path.write_text(new, encoding="utf-8")
              print("PATCHED app/build.gradle.kts")
          else:
              print("NOCHANGE app/build.gradle.kts")

          print("")
          print("Patched Gradle preview:")
          text = path.read_text(encoding="utf-8", errors="ignore")
          for i, line in enumerate(text.splitlines(), start=1):
              if i <= 260:
                  print(f"{i:04d}: {line}")
          PY

      - name: Build arm64 Debug APK
        run: |
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: List APK outputs
        run: |
          echo "APK outputs:"
          find app/build/outputs/apk -type f -name "*.apk" -exec ls -lh {} \;
          echo ""
          echo "APK files:"
          find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Inspect APK native libraries
        run: |
          mkdir -p /tmp/apk-inspect
          first_apk="$(find app/build/outputs/apk -type f -name "*.apk" | head -n 1)"
          echo "First APK: $first_apk"
          if [ -z "$first_apk" ]; then
            echo "No APK found"
            exit 1
          fi
          unzip -l "$first_apk" | grep '^ *[0-9]' | grep 'lib/.*/.*\.so' | sed -n '1,220p' || true
          echo ""
          echo "ABI folders in first APK:"
          unzip -l "$first_apk" | grep 'lib/' | awk -F/ '{print $2}' | sort -u || true

      - name: Upload arm64 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: super-video-downloader-v3-arm64-debug-apk
          path: "app/build/outputs/apk/debug/*arm64*.apk"
          if-no-files-found: warn

      - name: Upload fallback Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: super-video-downloader-v3-debug-apks-fallback
          path: "app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error