name: Clean UI Build v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Apply Clean UI patch v2
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          changed = []

          def read(p):
              return p.read_text(encoding="utf-8", errors="ignore")

          def write_if_changed(p, old, new):
              if new != old:
                  p.write_text(new, encoding="utf-8")
                  changed.append(str(p))
                  print("PATCHED:", p)
              else:
                  print("NOCHANGE:", p)

          def ensure_color_file(path):
              p = Path(path)
              if not p.exists():
                  print("SKIP missing:", p)
                  return

              old = read(p)
              new = old

              additions = {
                  "clean_ui_bg": "#FFF5FF",
                  "clean_ui_surface": "#FDF7FF",
                  "clean_ui_surface_container": "#F3EDF7",
                  "clean_ui_primary": "#536EA6",
                  "clean_ui_divider": "#1F000000",
              }

              for name, value in additions.items():
                  if f'name="{name}"' not in new:
                      new = new.replace(
                          "</resources>",
                          f'    <color name="{name}">{value}</color>\n</resources>'
                      )

              write_if_changed(p, old, new)

          def patch_theme_file(path):
              p = Path(path)
              if not p.exists():
                  print("SKIP missing:", p)
                  return

              old = read(p)
              new = old

              # Force window-level colors. Add only if absent.
              theme_items = [
                  '<item name="android:windowBackground">@color/clean_ui_bg</item>',
                  '<item name="android:statusBarColor">@color/clean_ui_bg</item>',
                  '<item name="android:navigationBarColor">@color/clean_ui_surface_container</item>',
                  '<item name="android:windowLightStatusBar">true</item>',
                  '<item name="android:windowLightNavigationBar">true</item>',
                  '<item name="colorSurface">@color/clean_ui_surface</item>',
                  '<item name="colorSurfaceVariant">@color/clean_ui_surface_container</item>',
                  '<item name="colorPrimary">@color/clean_ui_primary</item>',
              ]

              for item in theme_items:
                  key = re.search(r'name="([^"]+)"', item).group(1)
                  if f'name="{key}"' not in new:
                      # Insert into first style block.
                      new = new.replace("</style>", "        " + item + "\n    </style>", 1)

              write_if_changed(p, old, new)

          def patch_layout_file(path):
              p = Path(path)
              old = read(p)
              new = old

              # Make root containers use the same page background when they already have a background.
              new = re.sub(
                  r'android:background="(@color/[^"]+|#[A-Fa-f0-9]{6,8})"',
                  'android:background="@color/clean_ui_bg"',
                  new,
                  count=1
              )

              # Specific UI chrome should not keep the grey-white strip.
              chrome_tags = [
                  "androidx.appcompat.widget.Toolbar",
                  "com.google.android.material.appbar.MaterialToolbar",
                  "com.google.android.material.appbar.AppBarLayout",
                  "com.google.android.material.bottomnavigation.BottomNavigationView",
                  "com.google.android.material.navigation.NavigationBarView",
              ]

              for tag in chrome_tags:
                  pattern = rf'(<{re.escape(tag)}\b[^>]*)(>)'

                  def repl(m):
                      block = m.group(1)
                      end = m.group(2)
                      if 'android:background=' in block:
                          block = re.sub(
                              r'android:background="[^"]+"',
                              'android:background="@color/clean_ui_bg"',
                              block
                          )
                      else:
                          block += '\n        android:background="@color/clean_ui_bg"'
                      return block + end

                  new = re.sub(pattern, repl, new)

              # Bottom navigation should visually merge with the nav bar area.
              new = re.sub(
                  r'(<com\.google\.android\.material\.bottomnavigation\.BottomNavigationView\b[^>]*android:background=")[^"]+(")',
                  r'\1@color/clean_ui_surface_container\2',
                  new
              )

              # Reduce very large top spaces, but keep safe spacing.
              replacements = {
                  'android:paddingTop="96dp"': 'android:paddingTop="32dp"',
                  'android:paddingTop="88dp"': 'android:paddingTop="32dp"',
                  'android:paddingTop="80dp"': 'android:paddingTop="28dp"',
                  'android:layout_marginTop="96dp"': 'android:layout_marginTop="32dp"',
                  'android:layout_marginTop="88dp"': 'android:layout_marginTop="32dp"',
                  'android:layout_marginTop="80dp"': 'android:layout_marginTop="28dp"',
                  'android:layout_height="96dp"': 'android:layout_height="76dp"',
                  'android:layout_height="88dp"': 'android:layout_height="76dp"',
                  'app:itemIconSize="32dp"': 'app:itemIconSize="24dp"',
                  'app:itemIconSize="30dp"': 'app:itemIconSize="24dp"',
                  'app:itemIconSize="28dp"': 'app:itemIconSize="24dp"',
                  'app:cardCornerRadius="12dp"': 'app:cardCornerRadius="20dp"',
                  'app:cardCornerRadius="16dp"': 'app:cardCornerRadius="20dp"',
                  'app:cardElevation="2dp"': 'app:cardElevation="0dp"',
                  'app:cardElevation="4dp"': 'app:cardElevation="0dp"',
              }

              for a, b in replacements.items():
                  new = new.replace(a, b)

              write_if_changed(p, old, new)

          def patch_gradle_for_arm64(path):
              p = Path(path)
              if not p.exists():
                  print("SKIP missing:", p)
                  return

              old = read(p)
              new = old

              if "abiFilters.add(\"arm64-v8a\")" in new or "abiFilters += \"arm64-v8a\"" in new:
                  print("ABI filter already present")
                  return

              # Insert into defaultConfig block.
              m = re.search(r'(defaultConfig\s*\{)', new)
              if not m:
                  print("WARN: defaultConfig block not found")
                  return

              insert = '''
        ndk {
            abiFilters.add("arm64-v8a")
        }
'''
              pos = m.end()
              new = new[:pos] + insert + new[pos:]

              write_if_changed(p, old, new)

          root = Path("app/src/main/res")

          # Colors.
          ensure_color_file(root / "values" / "colors.xml")

          # Theme files.
          for p in [
              root / "values" / "styles.xml",
              root / "values" / "themes.xml",
              root / "values-night" / "styles.xml",
              root / "values-night" / "themes.xml",
          ]:
              patch_theme_file(p)

          # Layouts most likely responsible for screenshot issues.
          layout_dir = root / "layout"
          if layout_dir.exists():
              for p in layout_dir.glob("*.xml"):
                  name = p.name.lower()
                  if any(k in name for k in [
                      "main", "browser", "settings", "home", "navigation", "bottom", "progress", "video"
                  ]):
                      patch_layout_file(p)

          # ABI slimming.
          patch_gradle_for_arm64("app/build.gradle.kts")

          print("")
          print("Changed files:")
          for item in changed:
              print(" -", item)

          if not changed:
              raise SystemExit("Clean UI patch v2 made no changes.")
          PY

      - name: Build arm64 Debug APK
        run: |
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: List APK outputs
        run: |
          find app/build/outputs/apk -type f -name "*.apk" -exec ls -lh {} \;

      - name: Upload Clean UI arm64 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: super-video-downloader-clean-ui-v2-arm64-debug-apk
          path: app/build/outputs/apk/debug/*.apk