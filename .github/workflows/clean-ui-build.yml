name: Clean UI Build v2-r2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Apply Clean UI patch v2-r2
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          changed = []

          def read_text(path):
              return path.read_text(encoding="utf-8", errors="ignore")

          def write_if_changed(path, old, new):
              if new != old:
                  path.write_text(new, encoding="utf-8")
                  changed.append(str(path))
                  print("PATCHED:", path)
              else:
                  print("NOCHANGE:", path)

          def ensure_colors():
              path = Path("app/src/main/res/values/colors.xml")
              if not path.exists():
                  print("SKIP missing:", path)
                  return

              old = read_text(path)
              new = old

              colors = {
                  "clean_ui_bg": "#FFF5FF",
                  "clean_ui_surface": "#FFF7FF",
                  "clean_ui_surface_container": "#F3EDF7",
                  "clean_ui_primary": "#536EA6",
                  "clean_ui_divider": "#1F000000"
              }

              for name, value in colors.items():
                  if f'name="{name}"' not in new:
                      line = f'    <color name="{name}">{value}</color>\n'
                      new = new.replace("</resources>", line + "</resources>")

              write_if_changed(path, old, new)

          def patch_theme_file(path):
              if not path.exists():
                  print("SKIP missing:", path)
                  return

              old = read_text(path)
              new = old

              items = {
                  "android:windowBackground": "@color/clean_ui_bg",
                  "android:statusBarColor": "@color/clean_ui_bg",
                  "android:navigationBarColor": "@color/clean_ui_surface_container",
                  "android:windowLightStatusBar": "true",
                  "android:windowLightNavigationBar": "true",
                  "colorSurface": "@color/clean_ui_surface",
                  "colorSurfaceVariant": "@color/clean_ui_surface_container",
                  "colorPrimary": "@color/clean_ui_primary"
              }

              for key, value in items.items():
                  item_line = f'<item name="{key}">{value}</item>'
                  if f'name="{key}"' in new:
                      new = re.sub(
                          rf'<item\s+name="{re.escape(key)}">.*?</item>',
                          item_line,
                          new
                      )
                  else:
                      new = new.replace(
                          "</style>",
                          f"        {item_line}\n    </style>",
                          1
                      )

              write_if_changed(path, old, new)

          def patch_layout_file(path):
              old = read_text(path)
              new = old

              # Only change the first explicit root/container background.
              new = re.sub(
                  r'android:background="(@color/[^"]+|#[A-Fa-f0-9]{6,8})"',
                  'android:background="@color/clean_ui_bg"',
                  new,
                  count=1
              )

              # Safe mode:
              # Do not add new android:background attributes to tags.
              # Only replace existing background values inside known chrome components.
              chrome_tags = [
                  "androidx.appcompat.widget.Toolbar",
                  "com.google.android.material.appbar.MaterialToolbar",
                  "com.google.android.material.appbar.AppBarLayout",
                  "com.google.android.material.bottomnavigation.BottomNavigationView",
                  "com.google.android.material.navigation.NavigationBarView"
              ]

              for tag in chrome_tags:
                  pattern = rf'(<{re.escape(tag)}\b[^>]*android:background=")[^"]+(")'
                  new = re.sub(pattern, rf'\1@color/clean_ui_bg\2', new)

              # Bottom navigation: only if it already declares android:background.
              new = re.sub(
                  r'(<com\.google\.android\.material\.bottomnavigation\.BottomNavigationView\b[^>]*android:background=")[^"]+(")',
                  r'\1@color/clean_ui_surface_container\2',
                  new
              )

              replacements = {
                  'android:paddingTop="120dp"': 'android:paddingTop="32dp"',
                  'android:paddingTop="112dp"': 'android:paddingTop="32dp"',
                  'android:paddingTop="104dp"': 'android:paddingTop="32dp"',
                  'android:paddingTop="96dp"': 'android:paddingTop="32dp"',
                  'android:paddingTop="88dp"': 'android:paddingTop="32dp"',
                  'android:paddingTop="80dp"': 'android:paddingTop="28dp"',
                  'android:layout_marginTop="120dp"': 'android:layout_marginTop="32dp"',
                  'android:layout_marginTop="112dp"': 'android:layout_marginTop="32dp"',
                  'android:layout_marginTop="104dp"': 'android:layout_marginTop="32dp"',
                  'android:layout_marginTop="96dp"': 'android:layout_marginTop="32dp"',
                  'android:layout_marginTop="88dp"': 'android:layout_marginTop="32dp"',
                  'android:layout_marginTop="80dp"': 'android:layout_marginTop="28dp"',
                  'android:layout_height="96dp"': 'android:layout_height="76dp"',
                  'android:layout_height="88dp"': 'android:layout_height="76dp"',
                  'app:itemIconSize="32dp"': 'app:itemIconSize="24dp"',
                  'app:itemIconSize="30dp"': 'app:itemIconSize="24dp"',
                  'app:itemIconSize="28dp"': 'app:itemIconSize="24dp"',
                  'app:cardCornerRadius="12dp"': 'app:cardCornerRadius="20dp"',
                  'app:cardCornerRadius="16dp"': 'app:cardCornerRadius="20dp"',
                  'app:cardElevation="2dp"': 'app:cardElevation="0dp"',
                  'app:cardElevation="4dp"': 'app:cardElevation="0dp"'
              }

              for old_value, new_value in replacements.items():
                  new = new.replace(old_value, new_value)

              write_if_changed(path, old, new)

          def patch_layouts():
              layout_dir = Path("app/src/main/res/layout")
              if not layout_dir.exists():
                  print("SKIP missing:", layout_dir)
                  return

              keywords = [
                  "main",
                  "browser",
                  "settings",
                  "home",
                  "navigation",
                  "bottom",
                  "progress",
                  "video"
              ]

              for path in sorted(layout_dir.glob("*.xml")):
                  lower_name = path.name.lower()
                  if any(keyword in lower_name for keyword in keywords):
                      patch_layout_file(path)

          def patch_gradle_for_arm64():
              path = Path("app/build.gradle.kts")
              if not path.exists():
                  print("SKIP missing:", path)
                  return

              old = read_text(path)
              new = old

              if "arm64-v8a" in new and "abiFilters" in new:
                  print("ABI filter already present")
                  return

              match = re.search(r'defaultConfig\s*\{', new)
              if not match:
                  print("WARN: defaultConfig block not found")
                  return

              insert = ' ndk { abiFilters.add("arm64-v8a") }'
              pos = match.end()
              new = new[:pos] + insert + new[pos:]

              write_if_changed(path, old, new)

          ensure_colors()

          theme_files = [
              Path("app/src/main/res/values/styles.xml"),
              Path("app/src/main/res/values/themes.xml"),
              Path("app/src/main/res/values-night/styles.xml"),
              Path("app/src/main/res/values-night/themes.xml")
          ]

          for theme_file in theme_files:
              patch_theme_file(theme_file)

          patch_layouts()
          patch_gradle_for_arm64()

          print("")
          print("Changed files:")
          for item in changed:
              print(" -", item)

          if not changed:
              raise SystemExit("Clean UI patch v2-r2 made no changes.")
          PY

      - name: Build arm64 Debug APK
        run: |
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: List APK outputs
        run: |
          find app/build/outputs/apk -type f -name "*.apk" -exec ls -lh {} \;

      - name: Upload Clean UI arm64 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: super-video-downloader-clean-ui-v2-r2-arm64-debug-apk
          path: "app/build/outputs/apk/debug/*.apk"