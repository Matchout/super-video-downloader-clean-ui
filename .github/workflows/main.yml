name: Android Build v2

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/android-build-v2.yml"
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".gitmodules"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: List APK outputs
        run: |
          find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: super-video-downloader-v2-debug-apk
          path: app/build/outputs/apk/debug/*.apk